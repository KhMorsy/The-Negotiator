name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Runs identically for both collaborator accounts. No vendor secrets required.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Types · Architecture · Tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Architecture boundaries (dependency-cruiser)
        run: npm run arch:check

      - name: Docs freshness gate
        run: node scripts/check-docs-freshness.mjs
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}

      - name: Unit + contract + integration tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: E2E (simulated path)
    runs-on: ubuntu-latest
    needs: quality
    # Soft-skip until PR-I1 lands e2e specs; job still reports success when no tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npm run test:e2e
        continue-on-error: false
